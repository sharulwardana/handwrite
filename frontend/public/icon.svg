<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Pen icon white -->
  <g transform="translate(7, 7)">
    <!-- Pen body -->
    <path d="M13 1.5 L16.5 5 L6 15.5 L2 16.5 L3 12.5 Z" 
          fill="white" opacity="0.95"/>
    <!-- Pen tip highlight -->
    <path d="M13 1.5 L16.5 5 L15 6.5 L11.5 3 Z" 
          fill="white" opacity="0.6"/>
    <!-- Small line below pen (represents writing) -->
    <line x1="1" y1="17.5" x2="10" y2="17.5" 
          stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>